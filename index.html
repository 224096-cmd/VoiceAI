<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="google-site-verification" content="AekooUOkADSlNMKI7TVY4Uo_dT3hG0PqcBKcUQCV0_Q" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>VoiceAI - ローカルAI PWA</title>

  <meta name="description"
    content="VoiceAIはスマートフォンで動作するローカルAIチャットPWAです。OCR、QRコード読み取り、計算機能を搭載しています。">

  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>
<body>
  <div id="app">
    <header id="header">
      <h1 id="headerTitle">VoiceAI</h1>
      <div id="headerSub">
        <div id="adSlot"></div>
        <span id="offlineLabel" style="display:none;">（オフライン）</span>
      </div>
    </header>

    <main id="chatPage" class="page active">
      <select id="modelSelect"></select>
      <button id="downloadBtn">ダウンロード開始</button>
      <div id="status">モデルを選んで「ダウンロード開始」を押してください</div>
      <div id="log"></div>
      <div id="charCount">0文字</div>
      <div id="inputArea">
        <input id="input" placeholder="メッセージを入力" disabled />
        <button id="send" disabled aria-label="送信">➤</button>
      </div>
      <button id="searchModeToggle">🔎 検索OFF</button>
      <div id="toolbar">
        <button id="clearChat">会話をクリア</button>
        <button id="clearCache">キャッシュを完全削除</button>
      </div>
    </main>

    <main id="calcPage" class="page">
      <h2 class="pageTitle">計算モード</h2>
      <label class="switchRow">
        <input type="checkbox" id="calcDirectMode" />
        直接コマンドを入力する(AI変換を使わない)
      </label>
      <div id="calcInputArea">
        <input id="calcInput" placeholder="例：x²を微分して" />
        <button id="calcSend">計算</button>
      </div>
      <div id="calcResult"></div>

      <div id="calcLogHeader">
        <span>計算履歴</span>
        <span>
          <button id="calcLogDeleteSelected">選択削除</button>
          <button id="calcLogDeleteAll">全削除</button>
        </span>
      </div>
      <ul id="calcLog"></ul>

      <button id="calcCommandsToggle">コマンド一覧を表示</button>
      <div id="calcCommandsPanel"></div>
    </main>

    <main id="scanPage" class="page">
      <h2 class="pageTitle">スキャン</h2>

      <div id="scanVideoWrap">
        <video id="scanVideo" autoplay playsinline muted></video>
        <div id="scanPreviewWrap">
          <img id="scanPreview" alt="" />
          <div id="scanCropOverlay"></div>
        </div>
      </div>

      <div id="scanControls">
        <button id="scanCaptureBtn">撮影</button>
        <button id="scanRetakeBtn" style="display:none;">撮り直す</button>
        <button id="scanSaveAlbumBtn" style="display:none;">アルバムに保存</button>
      </div>
      <div id="scanSaveHint" style="display:none;">画像を長押しして「写真に追加」を選ぶと確実に保存できます</div>

      <canvas id="scanCanvas" style="display:none;"></canvas>

      <div id="scanButtons">
        <button id="ocrBtn" disabled>文字を読み取る(OCR)</button>
        <button id="qrBtn" disabled>QR/バーコードを読み取る</button>
      </div>
      <div id="scanStatus"></div>
      <div id="scanResult"></div>
      <div id="scanResultActions" style="display:none;">
        <button id="scanSendToChat">チャットへ送る</button>
        <button id="scanCopyBtn">コピー</button>
      </div>
    </main>

    <main id="historyPage" class="page">
      <h2 class="pageTitle">履歴・お気に入り・メモ</h2>
      <div class="subTabs">
        <button class="subTabBtn active" data-sub="historyList">会話履歴</button>
        <button class="subTabBtn" data-sub="favoriteList">お気に入り</button>
        <button class="subTabBtn" data-sub="noteList">メモ</button>
      </div>
      <input type="text" id="historySearch" placeholder="キーワードで検索" />

      <div class="listActions">
        <button id="historyDeleteSelected">選択削除</button>
        <button id="historyDeleteAll">全削除</button>
      </div>
      <ul id="historyList" class="subPage active"></ul>

      <div class="listActions" id="favActions" style="display:none;">
        <button id="favDeleteSelected">選択削除</button>
        <button id="favDeleteAll">全削除</button>
      </div>
      <ul id="favoriteList" class="subPage"></ul>

      <div class="listActions" id="noteActions" style="display:none;">
        <button id="noteNewBtn">＋新規メモ</button>
        <button id="noteDeleteSelected">選択削除</button>
        <button id="noteDeleteAll">全削除</button>
      </div>
      <div id="noteEditor" style="display:none;">
        <input type="text" id="noteTitleInput" placeholder="タイトル" />
        <textarea id="noteContentInput" rows="6" placeholder="内容"></textarea>
        <button id="noteSaveBtn">保存</button>
        <button id="noteCancelBtn">キャンセル</button>
      </div>
      <ul id="noteList" class="subPage"></ul>
    </main>

    <main id="settingsPage" class="page">
      <h2 class="pageTitle">AI設定</h2>
      <label class="fieldLabel" for="settingTemp">温度(temperature): <span id="settingTempVal"></span></label>
      <input type="range" id="settingTemp" min="0" max="1.5" step="0.1" />

      <label class="fieldLabel" for="settingTokens">最大トークン数(nPredict)</label>
      <input type="number" id="settingTokens" min="16" max="512" step="16" />

      <label class="fieldLabel" for="settingSystemPrompt">システムプロンプト({N}が最大トークン数に置き換わります)</label>
      <textarea id="settingSystemPrompt" rows="4"></textarea>

      <label class="switchRow">
        <input type="checkbox" id="settingAutoSpeak" />
        AIの回答を自動で読み上げる
      </label>

      <button id="settingSave">設定を保存</button>
      <button id="settingReset">初期値に戻す</button>
    </main>

    <main id="notifPage" class="page">
      <h2 class="pageTitle">通知</h2>
      <button id="enablePush">通知を有効化</button>

      <div id="reminderForm">
        <label class="fieldLabel" for="reminderTime">日時を設定</label>
        <input type="datetime-local" id="reminderTime" />

        <input type="text" id="reminderTitle" placeholder="お知らせの内容" />

        <label class="fieldLabel" for="reminderCount">通知回数</label>
        <select id="reminderCount"></select>

        <button id="addReminder">予定を追加</button>
      </div>

      <h3 id="reminderListTitle">設定済みの予定</h3>
      <ul id="reminderList"></ul>
    </main>

    <nav id="tabBar">
      <button class="tabBtn active" data-page="chatPage">💬<span>チャット</span></button>
      <button class="tabBtn" data-page="calcPage">🧮<span>計算</span></button>
      <button class="tabBtn" data-page="scanPage">📷<span>スキャン</span></button>
      <button class="tabBtn" data-page="historyPage">🕘<span>履歴</span></button>
      <button class="tabBtn" data-page="settingsPage">⚙️<span>設定</span></button>
      <button class="tabBtn" data-page="notifPage">🔔<span>通知</span></button>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
